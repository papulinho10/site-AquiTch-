<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AquiTchê Turismo - Gramado e Canela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
            },
            colors: {
              brand: {
                red: '#FF3B30',      /* Brighter, more cheerful red */
                dark: '#2d3436',     /* Softer dark gray, less harsh */
                gold: '#FFD700',
                green: '#00C853',    /* Vibrant green */
                blue: '#00A8E8',     /* New cheerful blue */
                cream: '#FFF9F0'     /* Warm background */
              }
            },
            animation: {
              marquee: 'marquee 20s linear infinite',
              'bounce-slow': 'bounce 3s infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling for anchor links */
      html {
        scroll-behavior: smooth;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
