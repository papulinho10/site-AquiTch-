<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AquiTchê Turismo - Serra Gaúcha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
            },
            colors: {
              brand: {
                red: '#FF2A4D',      /* Super vibrant red/pinkish for urgency/dopamine */
                wine: '#800020',     /* Deep Burgundy/Wine for Serra Gaúcha theme */
                dark: '#1A1A24',     /* Rich dark */
                gold: '#FFB800',     /* Pure glowing gold */
                green: '#00D084',    /* Minty vibrant success green */
                blue: '#00E5FF',     /* Electric blue */
                cream: '#FFF8F0'     /* Warm cozy cream */
              }
            },
            animation: {
              marquee: 'marquee 20s linear infinite',
              'bounce-slow': 'bounce 3s infinite',
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling for anchor links */
      html {
        scroll-behavior: smooth;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>

    "framer-motion": "https://esm.sh/framer-motion@11.11.11"
  }
}
</script>
